services:
  web:
    build:
      context: ../..
      dockerfile: infra/web-app-local/Dockerfile
    working_dir: /workspace/web-app
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: ${WEB_DATABASE_URL:?Set WEB_DATABASE_URL in infra/web-app-local/.env}
    ports:
      - "3000:3000"
    volumes:
      - ../../web-app:/workspace/web-app
      - ../../app-content:/workspace/app-content:ro
      - web_app_node_modules:/workspace/web-app/node_modules
      - web_app_next:/workspace/web-app/.next
    command: npm run dev -- --hostname 0.0.0.0

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE in infra/web-app-local/.env}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER in infra/web-app-local/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in infra/web-app-local/.env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in infra/web-app-local/.env}
    ports:
      - "3306:3306"
    volumes:
      - web_app_mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -p\"$$MYSQL_ROOT_PASSWORD\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  web_app_node_modules:
  web_app_next:
  web_app_mysql_data:
