name: Deploy GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          persist-credentials: false

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.9.0
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Pin npm
        run: npm install -g npm@9.2.0

      - name: Resolve Pages URLs
        id: pages
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: web-app
        run: npm ci

      - name: Lint
        working-directory: web-app
        run: npm run lint

      - name: Test
        working-directory: web-app
        run: npm test

      - name: Build static export
        working-directory: web-app
        env:
          NEXT_PUBLIC_APP_MODE: no-db
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.site_url }}
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b
        with:
          path: web-app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e
