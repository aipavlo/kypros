name: Deploy GitHub Pages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.9.0
          cache: npm
          cache-dependency-path: web-app/package-lock.json

      - name: Pin npm
        run: npm install -g npm@9.2.0

      - name: Resolve Pages URLs
        id: pages
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io" >> "$GITHUB_OUTPUT"
          else
            echo "base_path=/$REPO" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${OWNER}.github.io/$REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        working-directory: web-app
        run: npm ci

      - name: Lint
        working-directory: web-app
        run: npm run lint

      - name: Test
        working-directory: web-app
        run: npm test

      - name: Build static export
        working-directory: web-app
        env:
          NEXT_PUBLIC_APP_MODE: no-db
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_DEPLOY_TARGET: github-pages
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.site_url }}
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: web-app/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
