name: Secret Scanning

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve scan range
        id: range
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
              if git rev-parse "${AFTER}^" >/dev/null 2>&1; then
                RANGE="${AFTER}^..${AFTER}"
              else
                RANGE="${AFTER}"
              fi
            else
              RANGE="${BEFORE}..${AFTER}"
            fi
          fi

          echo "log_opts=${RANGE}" >> "${GITHUB_OUTPUT}"

      - name: Run Gitleaks
        uses: docker://ghcr.io/gitleaks/gitleaks:v8.24.2
        with:
          args: git . --log-opts=${{ steps.range.outputs.log_opts }} --report-format sarif --report-path gitleaks.sarif --redact --exit-code 1

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13
        with:
          sarif_file: gitleaks.sarif
